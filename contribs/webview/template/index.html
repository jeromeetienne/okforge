<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>OKF Webview</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<header class="topbar">
		<a class="brand" href="#/overview">
			<span class="brand-mark">OKF</span>
			<span class="brand-bundle" id="brand-bundle"></span>
		</a>
		<nav class="topnav">
			<a href="#/overview" data-route="overview">Overview</a>
			<a href="#/graph" data-route="graph">Graph</a>
			<a href="#/log" data-route="log">Log</a>
		</nav>
		<input id="search" type="search" placeholder="Search concepts…" autocomplete="off">
	</header>
	<div class="layout">
		<aside class="sidebar" id="sidebar"></aside>
		<main class="main" id="main"></main>
	</div>
	<script src="vendor/marked.min.js"></script>
	<script src="data.js"></script>
	<script src="app.js"></script>
</body>
</html>
